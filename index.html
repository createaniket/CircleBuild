<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <!-- Responsive -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary SEO -->
    <title>CircleBuilds | Build Smarter. Stay Managed.</title>
    <meta
      name="description"
      content="Apps, websites, systems and digital infrastructure - built faster, managed better, and designed to become the backbone of modern businesses."
    />
    <meta name="author" content="CircleBuild" />

    <!-- Theme -->
    <meta name="theme-color" content="#0B0B0B" />

    <!-- ✅ FAVICONS -->
    <link rel="icon" href="/favicon.ico" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/png" sizes="192x192" href="/favicon-192.png" />
    <link rel="icon" type="image/png" sizes="512x512" href="/favicon-512.png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />

    <!-- ✅ PWA Manifest -->
    <link rel="manifest" href="/manifest.json" />

    <!-- ✅ Open Graph (Facebook / LinkedIn) -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="CircleBuilds | Build Smarter. Stay Managed." />
    <meta
      property="og:description"
      content="Apps, websites, systems and digital infrastructure — built faster, managed better, and designed to become the backbone of modern businesses."
    />
    <meta
      property="og:image"
      content="./public/og_image.png"
    />

    <!-- ✅ Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="CircleBuild — Build & operate your business backbone" />
    <meta
      name="twitter:description"
      content="Apps, websites, systems and digital infrastructure — built faster, managed better, and designed to become the backbone of modern businesses."
    />
    <meta
      name="twitter:image"
      content="./public/og_image.png"
    />

    <!-- Optional (iOS app feel) -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  </head>

    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>

</html>
